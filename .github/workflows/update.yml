name: Automatischer Film-Update-Scan

on:
  schedule:
    - cron: '0 2 * * *' # Nachts immer nur die neuesten 50 Videos prüfen
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Vollständiger Archiv-Scan? (Häkchen setzen, wenn du neue Kanäle in die channels.txt eingetragen hast)'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: yt-dlp installieren und Kanäle scannen
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          
          # Prüfen, ob der User das Häkchen für den Vollscan gesetzt hat
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            echo "🚀 VOLLSTÄNDIGER ARCHIV-SCAN: Scanne die komplette Historie aller Kanäle..."
            yt-dlp --dump-json --flat-playlist --match-filter "duration > 1200" -a channels.txt > youtube-daten.jsonl || true
          else
            echo "⏱️ INKREMENTELLER SCAN: Hole nur die 50 neuesten Videos pro Kanal..."
            yt-dlp --dump-json --flat-playlist --playlist-end 50 --match-filter "duration > 1200" -a channels.txt > youtube-daten.jsonl || true
          fi

      - name: Filme aktualisieren (Skript ausführen)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node update-movies.js

      - name: Änderungen auf GitHub speichern (Commit & Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add filme.json img/*
          if ! git diff --cached --quiet; then
            git commit -m "Automatisches Update: Neue Filme hinzugefügt"
            git push
          else
            echo "Keine Änderungen vorhanden."
          finame: Automatischer Film-Update-Scan

