name: Automatischer Film-Update-Scan

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: yt-dlp installieren und komplettes Archiv laden
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --dump-json --flat-playlist "https://www.youtube.com/channel/UCJ5v_MCY6GNUBTO8-D3XoAg" > youtube-daten.jsonl || true

      - name: Filme aktualisieren (Skript ausführen)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node update-movies.js

      - name: Änderungen auf GitHub speichern (Commit & Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add filme.json img/*
          if ! git diff --cached --quiet; then
            git commit -m "Automatisches Update: Neue Filme hinzugefügt"
            git push
          else
            echo "Keine Änderungen vorhanden."
          fi
