<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>tubefilme (Test)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<style>
  :root {
    --bg: #121212;
    --bg-card: #1e1e1e;
    --text: #f2f2f2;
    --text-dim: #9a9a9a;
    --accent: #e5533c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid #2a2a2a;
  }
  header h1 {
    font-size: 20px;
    margin: 0;
    margin-right: auto;
  }
  header h1 span { color: var(--accent); }
  input[type="search"] {
    flex: 1;
    min-width: 180px;
    max-width: 360px;
    padding: 10px 34px 10px 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: var(--text);
    font-size: 14px;
  }
  /* Browser-eigenes Clear-Kreuz bei type="search" ausblenden, wir bauen ein eigenes */
  input[type="search"]::-webkit-search-cancel-button { display: none; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 360px; }
  .search-wrap input[type="search"] { max-width: none; width: 100%; }
  .search-clear {
    display: none;
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    line-height: 1;
    padding: 4px 8px;
    cursor: pointer;
  }
  .search-clear:hover { color: var(--text); }
  .search-wrap.has-text .search-clear { display: block; }
  select {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: var(--text);
    font-size: 14px;
  }
  button {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); border-color: var(--accent); }

  #status {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    padding: 20px;
  }
  .card {
    cursor: pointer;
    position: relative;
  }
  .card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    border-radius: 6px;
    background: #222;
    display: block;
  }
  .card .meta {
    padding-top: 6px;
    font-size: 13px;
    line-height: 1.3;
  }
  .card .year {
    color: var(--text-dim);
    font-size: 12px;
  }
  .card .fav {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .card .fav.active { color: var(--accent); }
  .card .low-confidence {
    position: absolute;
    top: 6px;
    left: 6px;
    background: rgba(0,0,0,0.6);
    border-radius: 4px;
    font-size: 10px;
    padding: 2px 5px;
    color: var(--text-dim);
  }
  .card .rating {
    position: absolute;
    bottom: 62px;
    left: 6px;
    background: rgba(0,0,0,0.7);
    border-radius: 4px;
    font-size: 11px;
    padding: 2px 6px;
    color: #ffd166;
  }
  .poster-placeholder {
    width: 100%;
    aspect-ratio: 2 / 3;
    border-radius: 6px;
    background: linear-gradient(160deg, #2a2a2a, #1a1a1a);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .similar-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 22px;
  }
  .similar-row h4 {
    grid-column: 1 / -1;
    margin: 0 0 4px 0;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: normal;
  }
  .similar-card { cursor: pointer; }
  .similar-card img, .similar-card .poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 6px;
    display: block;
  }
  .similar-card .similar-title {
    font-size: 12px;
    margin-top: 4px;
    line-height: 1.3;
  }

  #count {
    padding: 0 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  @media (max-width: 640px) {
    header { padding: 12px 14px; gap: 8px; }
    header h1 { width: 100%; }
    header h1 small { display: none; }
    .search-wrap { max-width: none; width: 100%; order: 3; }
    select { order: 4; width: 100%; }
    #grid { padding: 14px; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); }
    #count { padding: 0 14px; }
    .player-wrap { padding: 0 12px; margin: 70px auto 30px; }
    #closeBtn { top: 10px; right: 12px; }
  }

  /* Kino-Modus Overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 100;
    overflow-y: auto;
  }
  #overlay.open { display: block; }
  .player-wrap {
    max-width: 960px;
    margin: 40px auto;
    padding: 0 20px;
  }
  .player-wrap iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: none;
    border-radius: 8px;
  }
  .player-info {
    padding-top: 18px;
  }
  .player-info h2 {
    margin: 0 0 6px 0;
  }
  .player-info .sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .player-info p {
    line-height: 1.5;
    color: #ddd;
  }
  #closeBtn {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 110;
  }

  /* Zufalls-Auswahl */
  #randomOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 120;
    align-items: center;
    justify-content: center;
  }
  #randomOverlay.open { display: flex; }
  .random-panel {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 24px;
    max-width: 720px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .random-panel h3 {
    margin: 0 0 16px 0;
  }
  .random-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }
  .random-panel .actions {
    display: flex;
    gap: 10px;
  }
</style>
</head>
<body>

<header>
  <h1>tube<span>filme</span> <small style="color:var(--text-dim); font-size:12px;">(Test-Ansicht, kein Design)</small></h1>
  <div class="search-wrap" id="searchWrap">
    <input type="search" id="search" placeholder="Filme, Genre, Schauspieler oder Regie durchsuchen...">
    <button type="button" class="search-clear" id="searchClear" aria-label="Suche löschen">×</button>
  </div>
  <select id="genreFilter">
    <option value="">Alle Genres</option>
  </select>
  <button id="randomBtn">🎲 Zufall</button>
  <button id="watchlistBtn">♥ Merkliste</button>
</header>

<div id="status">Lade Filme...</div>
<div id="count"></div>
<div id="grid"></div>

<div id="overlay">
  <button id="closeBtn">✕ Schließen</button>
  <div class="player-wrap">
    <iframe id="player" src="" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="player-info">
      <h2 id="playerTitle"></h2>
      <div class="sub" id="playerSub"></div>
      <div class="sub" id="playerCast" style="margin-top:-8px;"></div>
      <div class="sub" id="playerCrew" style="margin-top:-8px;"></div>
      <button id="playerFav">♥ Zur Merkliste</button>
      <p id="playerOverview"></p>
      <div class="similar-row" id="playerSimilar"></div>
    </div>
  </div>
</div>

<div id="randomOverlay">
  <div class="random-panel">
    <h3>Was hältst du von diesen?</h3>
    <div class="random-grid" id="randomGrid"></div>
    <div class="actions">
      <button id="randomRerollBtn">🎲 Nochmal würfeln</button>
      <button id="randomCloseBtn">Abbrechen</button>
    </div>
  </div>
</div>

<script>
const FILME_URL = "https://raw.githubusercontent.com/Sobing23/tubefilme/main/data/filme.json";

// TMDB-Genre-IDs -> deutsche Namen (stabile, öffentliche Liste)
const GENRES = {28:"Action",12:"Abenteuer",16:"Animation",35:"Komödie",80:"Krimi",
  99:"Dokumentation",18:"Drama",10751:"Familie",14:"Fantasy",36:"Historie",
  27:"Horror",10402:"Musik",9648:"Mystery",10749:"Romantik",878:"Science Fiction",
  10770:"TV-Film",53:"Thriller",10752:"Kriegsfilm",37:"Western"};

let allMovies = [];
let fuse = null;
let watchlistMode = false;

const WATCHLIST_KEY = "tubefilme_merkliste";
function getWatchlist() {
  try { return new Set(JSON.parse(localStorage.getItem(WATCHLIST_KEY) || "[]")); }
  catch { return new Set(); }
}
function saveWatchlist(set) {
  localStorage.setItem(WATCHLIST_KEY, JSON.stringify([...set]));
}
function toggleWatchlist(tmdbId) {
  const wl = getWatchlist();
  wl.has(tmdbId) ? wl.delete(tmdbId) : wl.add(tmdbId);
  saveWatchlist(wl);
  return wl.has(tmdbId);
}

function parseDuration(iso) {
  if (!iso) return "";
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if (!m) return "";
  const h = parseInt(m[1] || 0), min = parseInt(m[2] || 0);
  return h > 0 ? `${h} Std ${min} Min` : `${min} Min`;
}

function genreNames(ids) {
  return (ids || []).map(id => GENRES[id]).filter(Boolean).slice(0, 2).join(", ");
}

function posterHtml(m, extraClass) {
  if (m.posterUrl) {
    return `<img class="${extraClass||''}" src="${m.posterUrl}" loading="lazy" alt="${escapeHtml(m.title)}">`;
  }
  return `<div class="poster-placeholder ${extraClass||''}">${escapeHtml(m.title)}</div>`;
}

function movieCardHtml(m, wl) {
  return `
    ${m.matchConfidence === "niedrig" ? '<div class="low-confidence" title="Zuordnung unsicher">?</div>' : ""}
    ${m.voteAverage ? `<div class="rating">★ ${m.voteAverage.toFixed(1)}</div>` : ""}
    <button class="fav ${wl.has(m.tmdbId) ? "active" : ""}" data-fav="${m.tmdbId}">♥</button>
    ${posterHtml(m)}
    <div class="meta">
      <div>${escapeHtml(m.title)}</div>
      <div class="year">${(m.releaseDate || "").slice(0,4)} · ${genreNames(m.genreIds)}</div>
    </div>
  `;
}

function renderGrid(movies) {
  const grid = document.getElementById("grid");
  const wl = getWatchlist();
  document.getElementById("count").textContent = `${movies.length} Film${movies.length === 1 ? "" : "e"}`;

  grid.innerHTML = movies.map(m => `<div class="card" data-id="${m.tmdbId}">${movieCardHtml(m, wl)}</div>`).join("");

  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.dataset.fav) return; // Herz-Klick nicht als Karten-Klick werten
      const id = parseInt(card.dataset.id);
      openPlayer(allMovies.find(m => m.tmdbId === id));
    });
  });
  grid.querySelectorAll("[data-fav]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.fav);
      const isActive = toggleWatchlist(id);
      btn.classList.toggle("active", isActive);
      if (watchlistMode) applyFilters(); // Karte verschwindet ggf. aus der Merkliste-Ansicht
    });
  });
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function openPlayer(movie) {
  if (!movie) return;
  document.getElementById("player").src = `https://www.youtube.com/embed/${movie.videoId}`;
  document.getElementById("playerTitle").textContent = movie.title;
  const ratingText = movie.voteAverage ? ` · ★ ${movie.voteAverage.toFixed(1)}` : "";
  document.getElementById("playerSub").textContent =
    `${(movie.releaseDate||"").slice(0,4)} · ${parseDuration(movie.duration)} · ${genreNames(movie.genreIds)}${ratingText} · Quelle: ${movie.channelName}`;
  document.getElementById("playerOverview").textContent = movie.overview || "Keine Beschreibung verfügbar.";
  document.getElementById("playerCast").textContent =
    movie.cast && movie.cast.length ? "Mit: " + movie.cast.join(", ") : "";

  const crewParts = [];
  if (movie.director && movie.director.length) crewParts.push("Regie: " + movie.director.join(", "));
  if (movie.writer && movie.writer.length) crewParts.push("Drehbuch: " + movie.writer.join(", "));
  document.getElementById("playerCrew").textContent = crewParts.join(" · ");

  renderSimilar(movie);

  const favBtn = document.getElementById("playerFav");
  const wl = getWatchlist();
  favBtn.classList.toggle("active", wl.has(movie.tmdbId));
  favBtn.onclick = () => {
    const isActive = toggleWatchlist(movie.tmdbId);
    favBtn.classList.toggle("active", isActive);
    renderGrid(currentlyShown());
  };

  document.getElementById("overlay").classList.add("open");
}

function closePlayer() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("player").src = ""; // Video stoppen
}

// Einfache, schnelle Empfehlung: gleiche Genres, mehr gemeinsame Genres
// zuerst, bei Gleichstand höhere Bewertung zuerst. Rein client-seitig,
// keine zusätzlichen Anfragen nötig, weil alle Filmdaten schon geladen sind.
function getSimilarMovies(movie, count) {
  const genreSet = new Set(movie.genreIds || []);
  if (genreSet.size === 0) return [];

  return allMovies
    .filter(m => m.tmdbId !== movie.tmdbId)
    .map(m => ({ m, shared: (m.genreIds || []).filter(id => genreSet.has(id)).length }))
    .filter(x => x.shared > 0)
    .sort((a, b) => b.shared - a.shared || (b.m.voteAverage || 0) - (a.m.voteAverage || 0))
    .slice(0, count)
    .map(x => x.m);
}

function renderSimilar(movie) {
  const container = document.getElementById("playerSimilar");
  const similar = getSimilarMovies(movie, 3);

  if (similar.length === 0) {
    container.innerHTML = "";
    return;
  }

  container.innerHTML = `<h4>Ähnliche Filme</h4>` + similar.map(m => `
    <div class="similar-card" data-id="${m.tmdbId}">
      ${posterHtml(m)}
      <div class="similar-title">${escapeHtml(m.title)}</div>
    </div>
  `).join("");

  container.querySelectorAll(".similar-card").forEach(card => {
    card.addEventListener("click", () => {
      const id = parseInt(card.dataset.id);
      openPlayer(allMovies.find(m => m.tmdbId === id));
    });
  });
}

let lastFiltered = [];
function currentlyShown() { return lastFiltered; }

function applyFilters() {
  const query = document.getElementById("search").value.trim();
  const selectedGenre = document.getElementById("genreFilter").value;

  let result = query && fuse ? fuse.search(query).map(r => r.item) : allMovies;

  if (selectedGenre) {
    result = result.filter(m => (m.genreIds || []).some(id => GENRES[id] === selectedGenre));
  }
  if (watchlistMode) {
    const wl = getWatchlist();
    result = result.filter(m => wl.has(m.tmdbId));
  }
  lastFiltered = result;
  renderGrid(result);
}

document.getElementById("search").addEventListener("input", () => {
  document.getElementById("searchWrap").classList.toggle("has-text", document.getElementById("search").value.length > 0);
  applyFilters();
});
document.getElementById("searchClear").addEventListener("click", () => {
  const input = document.getElementById("search");
  input.value = "";
  document.getElementById("searchWrap").classList.remove("has-text");
  input.focus();
  applyFilters();
});
document.getElementById("genreFilter").addEventListener("change", applyFilters);
document.getElementById("closeBtn").addEventListener("click", closePlayer);

// Zusätzliche, robustere Wege das Overlay zu schließen: Escape-Taste,
// Klick auf den dunklen Hintergrund außerhalb des Players
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closePlayer();
    closeRandomPanel();
  }
});
document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") closePlayer();
});

function pickRandomMovies(pool, count) {
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

function openRandomPanel() {
  const pool = watchlistMode ? lastFiltered : allMovies;
  if (pool.length === 0) return;
  renderRandomGrid(pickRandomMovies(pool, 6));
  document.getElementById("randomOverlay").classList.add("open");
}

function renderRandomGrid(movies) {
  const grid = document.getElementById("randomGrid");
  const wl = getWatchlist();
  grid.innerHTML = movies.map(m => `<div class="card" data-id="${m.tmdbId}">${movieCardHtml(m, wl)}</div>`).join("");

  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.dataset.fav) return;
      const id = parseInt(card.dataset.id);
      closeRandomPanel();
      openPlayer(allMovies.find(m => m.tmdbId === id));
    });
  });
  grid.querySelectorAll("[data-fav]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.fav);
      const isActive = toggleWatchlist(id);
      btn.classList.toggle("active", isActive);
    });
  });
}

function closeRandomPanel() {
  document.getElementById("randomOverlay").classList.remove("open");
}

document.getElementById("randomBtn").addEventListener("click", openRandomPanel);
document.getElementById("randomRerollBtn").addEventListener("click", () => {
  const pool = watchlistMode ? lastFiltered : allMovies;
  renderRandomGrid(pickRandomMovies(pool, 6));
});
document.getElementById("randomCloseBtn").addEventListener("click", closeRandomPanel);
document.getElementById("randomOverlay").addEventListener("click", (e) => {
  if (e.target.id === "randomOverlay") closeRandomPanel();
});

document.getElementById("watchlistBtn").addEventListener("click", (e) => {
  watchlistMode = !watchlistMode;
  e.target.classList.toggle("active", watchlistMode);
  applyFilters();
});

fetch(FILME_URL)
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    allMovies = data;
    // Genre-Namen und Cast pro Film vorberechnen -- einmal hier statt bei
    // jeder Suche neu, und als eigene Suchfelder nutzbar
    allMovies.forEach(m => {
      m.genreText = (m.genreIds || []).map(id => GENRES[id]).filter(Boolean).join(" ");
    });

    lastFiltered = data;
    fuse = new Fuse(allMovies, { keys: ["title", "originalTitle", "genreText", "cast", "director", "writer"], threshold: 0.3 });

    populateGenreFilter(allMovies);
    document.getElementById("status").style.display = "none";
    renderGrid(allMovies);
  })
  .catch(err => {
    document.getElementById("status").textContent = "Fehler beim Laden: " + err.message;
  });

function populateGenreFilter(movies) {
  const present = new Set();
  movies.forEach(m => (m.genreIds || []).forEach(id => GENRES[id] && present.add(GENRES[id])));
  const select = document.getElementById("genreFilter");
  [...present].sort((a, b) => a.localeCompare(b, "de")).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
}
</script>

</body>
</html>
