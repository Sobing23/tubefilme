<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>tubefilme (Test)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<style>
  :root {
    --bg: #121212;
    --bg-card: #1e1e1e;
    --text: #f2f2f2;
    --text-dim: #9a9a9a;
    --accent: #e5533c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid #2a2a2a;
  }
  header h1 {
    font-size: 20px;
    margin: 0;
    margin-right: auto;
  }
  header h1 span { color: var(--accent); }
  input[type="search"] {
    flex: 1;
    min-width: 180px;
    max-width: 360px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: var(--text);
    font-size: 14px;
  }
  button {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); border-color: var(--accent); }

  #status {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    padding: 20px;
  }
  .card {
    cursor: pointer;
    position: relative;
  }
  .card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    border-radius: 6px;
    background: #222;
    display: block;
  }
  .card .meta {
    padding-top: 6px;
    font-size: 13px;
    line-height: 1.3;
  }
  .card .year {
    color: var(--text-dim);
    font-size: 12px;
  }
  .card .fav {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .card .fav.active { color: var(--accent); }
  .card .low-confidence {
    position: absolute;
    top: 6px;
    left: 6px;
    background: rgba(0,0,0,0.6);
    border-radius: 4px;
    font-size: 10px;
    padding: 2px 5px;
    color: var(--text-dim);
  }

  #count {
    padding: 0 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  @media (max-width: 640px) {
    header { padding: 12px 14px; gap: 8px; }
    header h1 { width: 100%; }
    header h1 small { display: none; }
    input[type="search"] { max-width: none; order: 3; width: 100%; }
    #grid { padding: 14px; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); }
    #count { padding: 0 14px; }
    .player-wrap { padding: 0 12px; margin: 70px auto 30px; }
    #closeBtn { top: 10px; right: 12px; }
  }

  /* Kino-Modus Overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 100;
    overflow-y: auto;
  }
  #overlay.open { display: block; }
  .player-wrap {
    max-width: 960px;
    margin: 40px auto;
    padding: 0 20px;
  }
  .player-wrap iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: none;
    border-radius: 8px;
  }
  .player-info {
    padding-top: 18px;
  }
  .player-info h2 {
    margin: 0 0 6px 0;
  }
  .player-info .sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .player-info p {
    line-height: 1.5;
    color: #ddd;
  }
  #closeBtn {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 110;
  }

  /* Zufalls-Auswahl */
  #randomOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 120;
    align-items: center;
    justify-content: center;
  }
  #randomOverlay.open { display: flex; }
  .random-panel {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 24px;
    max-width: 720px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
  }
  .random-panel h3 {
    margin: 0 0 16px 0;
  }
  .random-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }
  .random-panel .actions {
    display: flex;
    gap: 10px;
  }
</style>
</head>
<body>

<header>
  <h1>tube<span>filme</span> <small style="color:var(--text-dim); font-size:12px;">(Test-Ansicht, kein Design)</small></h1>
  <input type="search" id="search" placeholder="Filme durchsuchen...">
  <button id="randomBtn">🎲 Zufall</button>
  <button id="watchlistBtn">♥ Merkliste</button>
</header>

<div id="status">Lade Filme...</div>
<div id="count"></div>
<div id="grid"></div>

<div id="overlay">
  <button id="closeBtn">✕ Schließen</button>
  <div class="player-wrap">
    <iframe id="player" src="" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="player-info">
      <h2 id="playerTitle"></h2>
      <div class="sub" id="playerSub"></div>
      <button id="playerFav">♥ Zur Merkliste</button>
      <p id="playerOverview"></p>
    </div>
  </div>
</div>

<div id="randomOverlay">
  <div class="random-panel">
    <h3>Was hältst du von diesen?</h3>
    <div class="random-grid" id="randomGrid"></div>
    <div class="actions">
      <button id="randomRerollBtn">🎲 Nochmal würfeln</button>
      <button id="randomCloseBtn">Abbrechen</button>
    </div>
  </div>
</div>

<script>
const FILME_URL = "https://raw.githubusercontent.com/Sobing23/tubefilme/main/data/filme.json";

// TMDB-Genre-IDs -> deutsche Namen (stabile, öffentliche Liste)
const GENRES = {28:"Action",12:"Abenteuer",16:"Animation",35:"Komödie",80:"Krimi",
  99:"Dokumentation",18:"Drama",10751:"Familie",14:"Fantasy",36:"Historie",
  27:"Horror",10402:"Musik",9648:"Mystery",10749:"Romantik",878:"Science Fiction",
  10770:"TV-Film",53:"Thriller",10752:"Kriegsfilm",37:"Western"};

let allMovies = [];
let fuse = null;
let watchlistMode = false;

const WATCHLIST_KEY = "tubefilme_merkliste";
function getWatchlist() {
  try { return new Set(JSON.parse(localStorage.getItem(WATCHLIST_KEY) || "[]")); }
  catch { return new Set(); }
}
function saveWatchlist(set) {
  localStorage.setItem(WATCHLIST_KEY, JSON.stringify([...set]));
}
function toggleWatchlist(tmdbId) {
  const wl = getWatchlist();
  wl.has(tmdbId) ? wl.delete(tmdbId) : wl.add(tmdbId);
  saveWatchlist(wl);
  return wl.has(tmdbId);
}

function parseDuration(iso) {
  if (!iso) return "";
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if (!m) return "";
  const h = parseInt(m[1] || 0), min = parseInt(m[2] || 0);
  return h > 0 ? `${h} Std ${min} Min` : `${min} Min`;
}

function genreNames(ids) {
  return (ids || []).map(id => GENRES[id]).filter(Boolean).slice(0, 2).join(", ");
}

function movieCardHtml(m, wl) {
  return `
    ${m.matchConfidence === "niedrig" ? '<div class="low-confidence" title="Zuordnung unsicher">?</div>' : ""}
    <button class="fav ${wl.has(m.tmdbId) ? "active" : ""}" data-fav="${m.tmdbId}">♥</button>
    <img src="${m.posterUrl || ''}" loading="lazy" alt="${escapeHtml(m.title)}">
    <div class="meta">
      <div>${escapeHtml(m.title)}</div>
      <div class="year">${(m.releaseDate || "").slice(0,4)} · ${genreNames(m.genreIds)}</div>
    </div>
  `;
}

function renderGrid(movies) {
  const grid = document.getElementById("grid");
  const wl = getWatchlist();
  document.getElementById("count").textContent = `${movies.length} Film${movies.length === 1 ? "" : "e"}`;

  grid.innerHTML = movies.map(m => `<div class="card" data-id="${m.tmdbId}">${movieCardHtml(m, wl)}</div>`).join("");

  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.dataset.fav) return; // Herz-Klick nicht als Karten-Klick werten
      const id = parseInt(card.dataset.id);
      openPlayer(allMovies.find(m => m.tmdbId === id));
    });
  });
  grid.querySelectorAll("[data-fav]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.fav);
      const isActive = toggleWatchlist(id);
      btn.classList.toggle("active", isActive);
      if (watchlistMode) applyFilters(); // Karte verschwindet ggf. aus der Merkliste-Ansicht
    });
  });
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function openPlayer(movie) {
  if (!movie) return;
  document.getElementById("player").src = `https://www.youtube.com/embed/${movie.videoId}?autoplay=1`;
  document.getElementById("playerTitle").textContent = movie.title;
  document.getElementById("playerSub").textContent =
    `${(movie.releaseDate||"").slice(0,4)} · ${parseDuration(movie.duration)} · ${genreNames(movie.genreIds)} · Quelle: ${movie.channelName}`;
  document.getElementById("playerOverview").textContent = movie.overview || "Keine Beschreibung verfügbar.";

  const favBtn = document.getElementById("playerFav");
  const wl = getWatchlist();
  favBtn.classList.toggle("active", wl.has(movie.tmdbId));
  favBtn.onclick = () => {
    const isActive = toggleWatchlist(movie.tmdbId);
    favBtn.classList.toggle("active", isActive);
    renderGrid(currentlyShown());
  };

  document.getElementById("overlay").classList.add("open");
}

function closePlayer() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("player").src = ""; // Video stoppen
}

let lastFiltered = [];
function currentlyShown() { return lastFiltered; }

function applyFilters() {
  const query = document.getElementById("search").value.trim();
  let result = query && fuse ? fuse.search(query).map(r => r.item) : allMovies;
  if (watchlistMode) {
    const wl = getWatchlist();
    result = result.filter(m => wl.has(m.tmdbId));
  }
  lastFiltered = result;
  renderGrid(result);
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("closeBtn").addEventListener("click", closePlayer);

// Zusätzliche, robustere Wege das Overlay zu schließen: Escape-Taste,
// Klick auf den dunklen Hintergrund außerhalb des Players
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closePlayer();
    closeRandomPanel();
  }
});
document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") closePlayer();
});

function pickRandomMovies(pool, count) {
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

function openRandomPanel() {
  const pool = watchlistMode ? lastFiltered : allMovies;
  if (pool.length === 0) return;
  renderRandomGrid(pickRandomMovies(pool, 6));
  document.getElementById("randomOverlay").classList.add("open");
}

function renderRandomGrid(movies) {
  const grid = document.getElementById("randomGrid");
  const wl = getWatchlist();
  grid.innerHTML = movies.map(m => `<div class="card" data-id="${m.tmdbId}">${movieCardHtml(m, wl)}</div>`).join("");

  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.dataset.fav) return;
      const id = parseInt(card.dataset.id);
      closeRandomPanel();
      openPlayer(allMovies.find(m => m.tmdbId === id));
    });
  });
  grid.querySelectorAll("[data-fav]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.fav);
      const isActive = toggleWatchlist(id);
      btn.classList.toggle("active", isActive);
    });
  });
}

function closeRandomPanel() {
  document.getElementById("randomOverlay").classList.remove("open");
}

document.getElementById("randomBtn").addEventListener("click", openRandomPanel);
document.getElementById("randomRerollBtn").addEventListener("click", () => {
  const pool = watchlistMode ? lastFiltered : allMovies;
  renderRandomGrid(pickRandomMovies(pool, 6));
});
document.getElementById("randomCloseBtn").addEventListener("click", closeRandomPanel);
document.getElementById("randomOverlay").addEventListener("click", (e) => {
  if (e.target.id === "randomOverlay") closeRandomPanel();
});

document.getElementById("watchlistBtn").addEventListener("click", (e) => {
  watchlistMode = !watchlistMode;
  e.target.classList.toggle("active", watchlistMode);
  applyFilters();
});

fetch(FILME_URL)
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    allMovies = data;
    lastFiltered = data;
    fuse = new Fuse(allMovies, { keys: ["title", "originalTitle"], threshold: 0.35 });
    document.getElementById("status").style.display = "none";
    renderGrid(allMovies);
  })
  .catch(err => {
    document.getElementById("status").textContent = "Fehler beim Laden: " + err.message;
  });
</script>

</body>
</html>
